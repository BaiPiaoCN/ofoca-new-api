<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- 引入 Tailwind CSS -->

    <!-- 引入 React 和 ReactDOM -->

    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 以在浏览器中编译 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- 图标组件 (替代 lucide-react) ---
        const Zap = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
        );
        const Book = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/></svg>
        );
        const Check = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="20 6 9 17 4 12"/></svg>
        );
        const Copy = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
        );
        const Activity = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        );
        const Shield = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 13c0 5-3.5 7.5-7.66 8.95a1 1 0 0 1-.67-.01C7.5 20.5 4 18 4 13V6a1 1 0 0 1 1-1c2-1 4-2 7-2 2.5 0 4.5 1 6.5 2a1 1 0 0 1 1 1z"/></svg>
        );
        const Cpu = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="16" height="16" x="4" y="4" rx="2"/><rect width="6" height="6" x="9" y="9" rx="1"/><path d="M15 2v2"/><path d="M15 20v2"/><path d="M2 15h2"/><path d="M2 9h2"/><path d="M20 15h2"/><path d="M20 9h2"/><path d="M9 2v2"/><path d="M9 20v2"/></svg>
        );

        // --- 全局样式注入 ---
        const StyleInjector = () => (
          <style dangerouslySetInnerHTML={{__html: `
            @import url('https://api.fontshare.com/v2/css?f[]=general-sans@600,700&display=swap');
            @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=JetBrains+Mono&family=Space+Grotesk:wght@400;500;600;700&display=swap');
            
            html { scroll-behavior: smooth; }
            
            :root {
              --bg-color: #FAFAFA;
              --text-main: #0A0A0A;
            }
            
            body {
              background-color: var(--bg-color);
              color: var(--text-main);
              font-family: 'DM Sans', "PingFang SC", "Microsoft YaHei", sans-serif;
              margin: 0;
              padding: 0;
              -webkit-font-smoothing: antialiased;
              -moz-osx-font-smoothing: grayscale;
              overflow-x: hidden;
              width: 100%;
            }

            .font-display { 
              font-family: 'General Sans', "PingFang SC", "Microsoft YaHei", sans-serif; 
              letter-spacing: -0.02em; 
            }
            
            .font-body { 
              font-family: 'DM Sans', "PingFang SC", "Microsoft YaHei", sans-serif; 
            }
            
            .font-code { 
              font-family: 'JetBrains Mono', monospace; 
            }

            .font-space {
              font-family: 'Space Grotesk', "PingFang SC", "Microsoft YaHei", sans-serif;
            }

            ::selection {
              background-color: #6366F1;
              color: #FFFFFF;
            }

            ::-webkit-scrollbar { width: 6px; height: 6px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb { background: #E8E8EC; border-radius: 4px; }
            ::-webkit-scrollbar-thumb:hover { background: #9C9C9C; }

            @keyframes blink {
              0%, 100% { opacity: 1; }
              50% { opacity: 0; }
            }
            .cursor-blink {
              animation: blink 1s step-end infinite;
              color: #8B5CF6;
              font-weight: 400;
            }

            @keyframes floatDown {
              from { opacity: 0; transform: translateY(-20px); }
              to { opacity: 1; transform: translateY(0); }
            }
            .animate-brand {
              animation: floatDown 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            }
            
            @keyframes fadeInSlideUp {
              from { opacity: 0; transform: translateY(20px); }
              to { opacity: 1; transform: translateY(0); }
            }
            .animate-hero-content {
              opacity: 0;
              animation: fadeInSlideUp 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
              animation-delay: 0.3s;
            }
          `}} />
        );

        // --- 滚动揭示动画组件 ---
        const RevealOnScroll = ({ children, delay = 0, className = '' }) => {
          const [isVisible, setIsVisible] = useState(false);
          const ref = useRef(null);

          useEffect(() => {
            const observer = new IntersectionObserver(
              ([entry]) => {
                if (entry.isIntersecting) {
                  setIsVisible(true);
                  observer.unobserve(ref.current);
                }
              },
              { threshold: 0.1, rootMargin: '0px 0px -50px 0px' }
            );
            
            if (ref.current) {
              observer.observe(ref.current);
            }
            
            return () => {
              if (ref.current) observer.disconnect();
            };
          }, []);

          return (
            <div
              ref={ref}
              className={`transition-all duration-1000 ease-out ${
                isVisible ? 'opacity-100 translate-y-0' : 'opacity-0 translate-y-12'
              } ${className}`}
              style={{ transitionDelay: `${delay}ms` }}
            >
              {children}
            </div>
          );
        };

        // --- 交互式点阵背景 ---
        const InteractiveDotGrid = () => {
          const canvasRef = useRef(null);

          useEffect(() => {
            const canvas = canvasRef.current;
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            let width, height;
            let mouse = { x: -1000, y: -1000 };

            const resize = () => {
              width = canvas.width = window.innerWidth;
              height = canvas.height = canvas.parentElement.offsetHeight;
            };

            const handleMouseMove = (e) => {
              const rect = canvas.getBoundingClientRect();
              mouse.x = e.clientX - rect.left;
              mouse.y = e.clientY - rect.top;
            };

            const handleMouseLeave = () => {
              mouse.x = -1000;
              mouse.y = -1000;
            };

            window.addEventListener('resize', resize);
            canvas.addEventListener('mousemove', handleMouseMove);
            canvas.addEventListener('mouseleave', handleMouseLeave);
            resize();

            const draw = () => {
              ctx.clearRect(0, 0, width, height);
              const spacing = 32;
              const radius = 1.5;

              for (let x = spacing / 2; x < width; x += spacing) {
                for (let y = spacing / 2; y < height; y += spacing) {
                  const dx = x - mouse.x;
                  const dy = y - mouse.y;
                  const dist = Math.sqrt(dx * dx + dy * dy);
                  
                  let alpha = 0.2;
                  let r = radius;
                  let color = '#9C9C9C';

                  if (dist < 120) {
                    const intensity = 1 - dist / 120;
                    r = radius + intensity * 1.5;
                    alpha = 0.2 + intensity * 0.4;
                    color = `rgba(99, 102, 241, ${alpha})`; 
                  } else {
                    color = `rgba(156, 156, 156, ${alpha})`;
                  }

                  ctx.beginPath();
                  ctx.arc(x, y, r, 0, Math.PI * 2);
                  ctx.fillStyle = color;
                  ctx.fill();
                }
              }
              requestAnimationFrame(draw);
            };

            draw();

            return () => {
              window.removeEventListener('resize', resize);
              canvas.removeEventListener('mousemove', handleMouseMove);
              canvas.removeEventListener('mouseleave', handleMouseLeave);
            };
          }, []);

          return (
            <canvas 
              ref={canvasRef} 
              className="absolute inset-0 pointer-events-auto"
              style={{ zIndex: 0 }}
            />
          );
        };

        // --- 基础组件 ---
        const Button = ({ children, variant = 'primary', className = '', href, target, ...props }) => {
          const baseStyle = "inline-flex items-center justify-center font-medium transition-all duration-300 text-[14px] rounded-[8px] px-[20px] py-[10px] h-[40px] cursor-pointer outline-none focus:ring-[3px] focus:ring-[#6366F1]/12 no-underline text-center";
          
          const variants = {
            primary: "bg-[#6366F1] text-[#FFFFFF] hover:bg-[#4F46E5] hover:-translate-y-[2px] hover:shadow-[0_8px_20px_rgba(99,102,241,0.35)]",
            secondary: "bg-[#FFFFFF] text-[#0A0A0A] border border-[#E8E8EC] hover:-translate-y-[2px] hover:border-[#9C9C9C] hover:shadow-[0_8px_20px_rgba(0,0,0,0.06)]",
            ghost: "bg-transparent text-[#6B6B6B] hover:text-[#0A0A0A] hover:bg-[#E8E8EC]/50"
          };

          const Component = href ? 'a' : 'button';

          return (
            <Component 
              href={href} 
              target={target}
              rel={target === '_blank' ? "noopener noreferrer" : undefined}
              className={`${baseStyle} ${variants[variant]} ${className}`} 
              {...props}
            >
              {children}
            </Component>
          );
        };

        const Card = ({ children, className = '', hoverEffect = true }) => {
          return (
            <div className={`
              bg-[#FFFFFF] border border-[#E8E8EC] rounded-[12px] 
              ${hoverEffect ? 'hover:-translate-y-[2px] hover:shadow-[0_8px_30px_rgba(0,0,0,0.08)] transition-all duration-300' : ''}
              ${className}
            `}>
              {children}
            </div>
          );
        };

        const Chip = ({ children, status }) => {
          const statusStyles = {
            default: "bg-[#F3F4F6] text-[#6B6B6B]",
            success: "bg-[#10B981]/10 text-[#10B981]",
            warning: "bg-[#F59E0B]/10 text-[#F59E0B]",
            error: "bg-[#EF4444]/10 text-[#EF4444]",
            primary: "bg-[#6366F1]/10 text-[#6366F1]"
          };
          
          const style = statusStyles[status] || statusStyles.default;

          return (
            <span className={`px-[12px] py-[4px] rounded-full text-[12px] font-medium tracking-wide ${style}`}>
              {children}
            </span>
          );
        };

        // --- 页面分块组件 ---
        const Hero = () => {
          const [typedText, setTypedText] = useState('');
          const [isDeleting, setIsDeleting] = useState(false);
          const [loopNum, setLoopNum] = useState(0);
          const [typingSpeed, setTypingSpeed] = useState(150);

          const phrases = ["编辑级精度的路由体验。", "企业级的高可用架构。", "无缝的多模型集成方案。"];

          useEffect(() => {
            let timer = setTimeout(() => {
              const current = loopNum % phrases.length;
              const fullText = phrases[current];

              if (isDeleting) {
                setTypedText(fullText.substring(0, typedText.length - 1));
                setTypingSpeed(50);
              } else {
                setTypedText(fullText.substring(0, typedText.length + 1));
                setTypingSpeed(100);
              }

              if (!isDeleting && typedText === fullText) {
                setTimeout(() => setIsDeleting(true), 2000);
              } else if (isDeleting && typedText === '') {
                setIsDeleting(false);
                setLoopNum(loopNum + 1);
                setTypingSpeed(500);
              }
            }, typingSpeed);

            return () => clearTimeout(timer);
          }, [typedText, isDeleting, loopNum, typingSpeed]);

          return (
            <section className="relative pt-[80px] pb-[60px] md:pt-[120px] md:pb-[80px] lg:pt-[160px] lg:pb-[120px] overflow-hidden border-b border-[#E8E8EC] min-h-[100vh] flex flex-col justify-center">
              <InteractiveDotGrid />
              <div className="relative z-10 max-w-[1280px] mx-auto px-[24px] text-center flex flex-col items-center">
                
                <div className="mb-[24px] animate-brand">
                  <span className="font-display font-bold text-[28px] md:text-[32px] tracking-tight text-[#8B5CF6]">
                    Ofoca AI
                  </span>
                </div>

                <div className="flex flex-col items-center animate-hero-content w-full">
                  <div className="mb-[24px]">
                    <Chip status="primary">
                      <span className="flex items-center gap-2">
                        <Zap size={12} className="text-[#6366F1]" /> 
                        v2.4.0 引擎现已上线
                      </span>
                    </Chip>
                  </div>
                  
                  <h1 className="font-display font-bold text-[36px] md:text-[56px] lg:text-[64px] leading-[1.2] text-[#0A0A0A] max-w-[900px] min-h-[130px] md:min-h-[140px]">
                    为您的 AI 基础设施提供 <br className="hidden md:block"/>
                    <span className="text-[#8B5CF6]">{typedText}</span><span className="cursor-blink">|</span>
                  </h1>
                  
                  <p className="mt-[16px] md:mt-[24px] text-[16px] md:text-[20px] text-[#6B6B6B] max-w-[700px] leading-relaxed font-body px-[12px] md:px-0">
                    通过单一且无缝集成的端点，访问 OpenAI、Anthropic、Gemini 等众多顶尖模型。为极致性能而生，为清晰架构而设计。
                  </p>
                  
                  <div className="mt-[40px] flex flex-col sm:flex-row items-center justify-center gap-[16px] w-full px-[12px] md:px-0">
                    <Button 
                      variant="primary" 
                      href="https://coding.cnmnmsl.cloud/dashboard/overview"
                      target="_blank"
                      className="h-[48px] md:h-[52px] px-[32px] text-[16px] w-full sm:w-auto shadow-[0_0_20px_rgba(99,102,241,0.4)]"
                    >
                      立即开始构建
                    </Button>
                    <Button 
                      variant="secondary" 
                      href="https://coding.cnmnmsl.cloud/about"
                      className="h-[48px] md:h-[52px] px-[32px] text-[16px] w-full sm:w-auto font-medium"
                    >
                      <Book size={18} className="mr-2 text-[#6B6B6B]" /> 探索开发文档
                    </Button>
                  </div>
                </div>
              </div>
            </section>
          );
        };

        const CodeIntegration = () => {
          const [copied, setCopied] = useState(false);
          
          const codeString = `import OpenAI from "openai";

const client = new OpenAI({
  apiKey: "ofoca-xxxxxx-xxxxxx",
  baseURL: "https://api.ofoca.ai/v1", // <-- 仅需更改此行即可接入
});

const response = await client.chat.completions.create({
  model: "claude-3-5-sonnet", // 享受所有模型的原生级支持
  messages: [{ role: "user", content: "Hello, system." }],
});`;

          const copyToClipboard = () => {
            navigator.clipboard.writeText(codeString);
            setCopied(true);
            setTimeout(() => setCopied(false), 2000);
          };

          return (
            <section className="py-[48px] lg:py-[96px] bg-[#FAFAFA] overflow-hidden">
              <div className="max-w-[1280px] mx-auto px-[24px] grid lg:grid-cols-2 gap-[32px] md:gap-[48px] items-center">
                <RevealOnScroll delay={100}>
                  <h2 className="font-display font-bold text-[28px] md:text-[32px] text-[#0A0A0A] mb-[16px]">
                    只需一行代码，掌控全局。
                  </h2>
                  <p className="text-[14px] md:text-[15px] text-[#6B6B6B] leading-relaxed mb-[32px]">
                    我们严格遵循 OpenAI API 标准格式。您可以将现有的服务提供商无缝切换至 Ofoca AI，在此过程中无需重写任何业务逻辑、提示词工程或函数调用代码。
                  </p>
                  
                  <div className="flex flex-col gap-[16px]">
                    {[
                      "完美替代官方 OpenAI SDK",
                      "原生支持流式输出与 Function Calling 工具调用",
                      "自动执行负载均衡与跨区域故障转移",
                      "毫秒级中转，近乎零延迟的性能开销"
                    ].map((feature, i) => (
                      <div key={i} className="flex items-center gap-[12px]">
                        <div className="w-[20px] h-[20px] rounded-full bg-[#10B981]/10 flex items-center justify-center shrink-0">
                          <Check size={12} className="text-[#10B981]" />
                        </div>
                        <span className="text-[14px] md:text-[15px] text-[#0A0A0A] font-medium">{feature}</span>
                      </div>
                    ))}
                  </div>
                </RevealOnScroll>

                <RevealOnScroll delay={300} className="w-full min-w-0">
                  <Card hoverEffect={false} className="bg-[#0A0A0A] border-[#333333] shadow-xl overflow-hidden relative group w-full">
                    <div className="flex items-center justify-between px-[16px] py-[12px] border-b border-[#333333] bg-[#111111]">
                      <div className="flex items-center gap-[8px]">
                        <div className="w-3 h-3 rounded-full bg-[#EF4444]"></div>
                        <div className="w-3 h-3 rounded-full bg-[#F59E0B]"></div>
                        <div className="w-3 h-3 rounded-full bg-[#10B981]"></div>
                      </div>
                      <span className="text-[12px] text-[#9C9C9C] font-code hidden sm:block">integration.ts</span>
                      <button 
                        onClick={copyToClipboard}
                        className="text-[#9C9C9C] hover:text-[#FFFFFF] transition-colors flex items-center gap-1.5"
                        title="复制代码"
                      >
                        {copied ? <Check size={16} className="text-[#10B981]" /> : <Copy size={16} />}
                      </button>
                    </div>
                    
                    <div className="p-[16px] md:p-[24px] overflow-x-auto w-full max-w-[calc(100vw-48px)] lg:max-w-none box-border">
                      <pre className="font-code text-[11px] sm:text-[12px] md:text-[13px] leading-[1.6] text-[#E8E8EC]">
                        <code dangerouslySetInnerHTML={{
                          __html: codeString
                            .replace(/import|from|const|new|await/g, '<span class="text-[#6366F1]">$&</span>')
                            .replace(/".*?"/g, '<span class="text-[#10B981]">$&</span>')
                            .replace(/\/\/.*/g, '<span class="text-[#6B6B6B]">$&</span>')
                        }} />
                      </pre>
                    </div>
                  </Card>
                </RevealOnScroll>
              </div>
            </section>
          );
        };

        const Features = () => {
          const items = [
            {
              icon: <Activity size={24} className="text-[#6366F1]" />,
              title: "实时遥测分析",
              desc: "在仪表盘中实时监控 Token 消耗、接口延迟和成本账单。为您所有的 AI 支出提供具有可操作性的业务洞察。"
            },
            {
              icon: <Shield size={24} className="text-[#6366F1]" />,
              title: "企业级安全防护",
              desc: "所有请求提供端到端加密，支持团队级的自定义速率限制与硬性预算上限设定，杜绝任何意外的财务超支。"
            },
            {
              icon: <Cpu size={24} className="text-[#6366F1]" />,
              title: "智能动态路由",
              desc: "基于实时测量的全球网络健康状况与各个供应商的吞吐量，系统会自动将请求路由至最快或最经济的可用节点。"
            }
          ];

          return (
            <section className="py-[48px] lg:py-[96px] bg-[#FFFFFF] border-t border-[#E8E8EC]">
              <div className="max-w-[1280px] mx-auto px-[24px]">
                <RevealOnScroll>
                  <div className="text-center mb-[32px] md:mb-[48px]">
                    <h2 className="font-display font-bold text-[28px] md:text-[32px] text-[#0A0A0A]">为生产环境而生。</h2>
                  </div>
                </RevealOnScroll>
                
                <div className="grid grid-cols-1 md:grid-cols-3 gap-[16px] md:gap-[24px]">
                  {items.map((item, idx) => (
                    <RevealOnScroll key={idx} delay={idx * 150}>
                      <Card className="p-[24px] md:p-[32px] flex flex-col items-start text-left h-full">
                        <div className="w-[48px] h-[48px] rounded-full bg-[#6366F1]/10 flex items-center justify-center mb-[16px] md:mb-[20px] shrink-0">
                          {item.icon}
                        </div>
                        <h3 className="text-[18px] font-bold text-[#0A0A0A] mb-[8px] md:mb-[12px] font-display">{item.title}</h3>
                        <p className="text-[14px] text-[#6B6B6B] leading-relaxed">{item.desc}</p>
                      </Card>
                    </RevealOnScroll>
                  ))}
                </div>
              </div>
            </section>
          );
        };

        const ModelsList = () => {
          const models = [
            { name: "gpt-4o", provider: "OpenAI", context: "128k", price: "$5.00 / 1M", status: "success" },
            { name: "claude-3-5-sonnet", provider: "Anthropic", context: "200k", price: "$3.00 / 1M", status: "success" },
            { name: "gemini-1.5-pro", provider: "Google", context: "2M", price: "$3.50 / 1M", status: "success" },
            { name: "llama-3-70b-instruct", provider: "Meta", context: "8k", price: "$0.70 / 1M", status: "success" },
            { name: "mistral-large", provider: "Mistral", context: "32k", price: "$4.00 / 1M", status: "warning" },
          ];

          return (
            <section id="models" className="py-[48px] lg:py-[96px] bg-[#FAFAFA] border-t border-[#E8E8EC] overflow-hidden">
              <div className="max-w-[1280px] mx-auto px-[24px]">
                <RevealOnScroll>
                  <div className="flex flex-col md:flex-row justify-between items-start md:items-end mb-[24px] md:mb-[32px]">
                    <div>
